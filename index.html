<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DevConf 2026 Landing Page Design</title>

    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            <img src="./assets/footer-logo.png" alt="DevConf 2026 Logo">
        </div>

        <ul class="nav-links">
            <li><a href="#">Speakers</a></li>
            <li><a href="#">Schedule</a></li>
            <li><a href="#">Tracks</a></li>
            <li><a href="#">Venue</a></li>
            <li><a href="#">Blog</a></li>
        </ul>

        <button class="btn">Register Now</button>

    </nav>

    <section class="Hero">

        <img src="./assets/banner.jpg" alt="Hero Banner" class="banner-img">

        <div class="heading">
            Code. <em>Connect.</em> Create
        </div>

        <div class="paragraph">
            <p>
                Join 4,000+ engineers, founders, and builders at the premier developer
                conference of 2026. Three days of cutting-edge talks, hands-on workshops,
                and meaningful connections.
            </p>
        </div>

        <button class="btn">Register Now</button>

    </section>


</body>

</html>
